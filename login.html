<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş Yap · Proje Fikri Bulucu</title>
<style>
  :root{
    --bg:#0d1117;
    --surface:#161b22;
    --border:#262d38;
    --text:#e6edf3;
    --text-dim:#8b949e;
    --accent:#7c5cff;
    --accent-2:#22d3ee;
    --red:#f85149;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    background:
      radial-gradient(1000px 600px at 15% 10%, rgba(124,92,255,.22), transparent 60%),
      radial-gradient(900px 600px at 85% 90%, rgba(34,211,238,.16), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family: "Segoe UI", Inter, -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
  }

  #loginLoading{
    color:var(--text-dim);
    font-size:.9rem;
  }

  .login-wrap{
    visibility:hidden;
    width:100%;
    max-width:420px;
  }

  @keyframes popIn{
    0%{opacity:0;transform:scale(.85) translateY(14px);}
    60%{opacity:1;transform:scale(1.02) translateY(-2px);}
    100%{opacity:1;transform:scale(1) translateY(0);}
  }

  .login-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:22px;
    padding:40px 34px;
    text-align:center;
    box-shadow:0 30px 70px rgba(0,0,0,.5);
    animation:popIn .4s cubic-bezier(.2,.9,.3,1.2);
  }
  .login-card .login-logo{font-size:2.6rem;margin-bottom:6px;}
  .login-card h1{
    font-size:1.5rem;
    margin:0 0 10px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .login-card p.sub{color:var(--text-dim);font-size:.9rem;line-height:1.6;margin:0 0 28px;}

  .auth-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:var(--bg);
    border:1px solid var(--border);
    color:var(--text);
    padding:12px 16px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    font-size:.88rem;
    transition:all .15s ease;
    margin-bottom:12px;
  }
  .auth-btn:hover{border-color:var(--accent);color:var(--accent-2);box-shadow:0 10px 22px rgba(124,92,255,.15);}

  .login-guest-btn{
    width:100%;
    background:none;
    border:1px solid var(--border);
    color:var(--text-dim);
    padding:11px 16px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    font-size:.85rem;
    transition:all .15s ease;
  }
  .login-guest-btn:hover{color:var(--text);border-color:#3a4454;}

  .auth-error{
    text-align:center;
    font-size:.78rem;
    color:var(--red);
    margin-top:16px;
    min-height:16px;
  }
</style>
</head>
<body>
  <div id="loginLoading">Yükleniyor...</div>

  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div class="login-logo">🚀</div>
      <h1>Proje Fikri Bulucu</h1>
      <p class="sub">Fikirlerini kaydetmek, cihazlar arasında senkronize etmek ve kaldığın yerden devam etmek için Google ile giriş yap.</p>
      <button class="auth-btn" id="gateGoogleSignInBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.583-5.036-3.71H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
        </svg>
        <span>Google ile Giriş Yap</span>
      </button>
      <button class="login-guest-btn" id="gateGuestBtn" type="button">Misafir olarak devam et</button>
      <div class="auth-error" id="authErrorMsg"></div>
    </div>
  </div>

  <script type="module" src="firebase-init.js"></script>
  <script>
    const LS_GUEST = 'pfb_guest_v1';

    function setAuthError(msg){
      document.getElementById('authErrorMsg').textContent = msg || '';
    }
    function showCard(){
      document.getElementById('loginLoading').style.display = 'none';
      document.getElementById('loginWrap').style.visibility = 'visible';
    }
    function goToApp(){
      window.location.href = 'index.html';
    }

    function waitForFn(name, tries){
      return new Promise((resolve) => {
        let count = 0;
        const iv = setInterval(() => {
          count++;
          if(typeof window[name] === 'function' || count > (tries || 50)){
            clearInterval(iv);
            resolve(typeof window[name] === 'function');
          }
        }, 100);
      });
    }

    document.getElementById('gateGoogleSignInBtn').addEventListener('click', async () => {
      setAuthError('');
      try{
        await window.__signInWithGoogle();
        // Giriş başarılı olduğunda aşağıdaki __onAuthChange dinleyicisi
        // yeni kullanıcıyı yakalayıp otomatik olarak yönlendirecek.
      }catch(err){
        console.error(err);
        setAuthError('Giriş başarısız: ' + ((err && err.message) || 'bilinmeyen hata'));
      }
    });

    document.getElementById('gateGuestBtn').addEventListener('click', () => {
      localStorage.setItem(LS_GUEST, '1');
      goToApp();
    });

    (async function initLogin(){
      // Zaten misafir olarak devam etmeyi seçmişse, giriş sayfasını tekrar gösterme.
      if(localStorage.getItem(LS_GUEST) === '1'){
        goToApp();
        return;
      }

      const ready = await waitForFn('__onAuthChange', 50);
      if(!ready){
        // Firebase modülü yüklenemedi, giriş yapmanın bir anlamı yok.
        localStorage.setItem(LS_GUEST, '1');
        goToApp();
        return;
      }

      if(window.__firebaseConfigured === false){
        // Firebase henüz yapılandırılmamış, giriş sayfasını atla.
        localStorage.setItem(LS_GUEST, '1');
        goToApp();
        return;
      }

      let redirected = false;
      window.__onAuthChange((user) => {
        if(user && !redirected){
          redirected = true;
          goToApp();
        }else if(!user && !redirected){
          showCard();
        }
      });
    })();
  </script>
</body>
</html>
